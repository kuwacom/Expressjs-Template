openapi: 3.0.1

info:
  title: Expressjs-Restful-Template
  description: ユーザーの登録および取得を行うAPI
  version: 1.0.0
servers:
  - url: http://localhost:3000/v1
    description: ローカル開発用サーバー

paths:
  /users:
    post:
      summary: 新しいユーザーを登録する
      description: 名前を入力して新しいユーザーを登録します。
      tags:
        - ユーザー
      requestBody:
        description: 登録するユーザーのデータ
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: 山田 太郎
              required:
                - name
      responses:
        '201':
          description: ユーザーの登録が成功した場合
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: リクエストボディのバリデーションに失敗した場合
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: ユーザー登録に失敗した場合
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    
    get:
      summary: 全ユーザーの取得
      description: 登録されている全てのユーザーを取得します。
      tags:
        - ユーザー
      responses:
        '200':
          description: ユーザーの一覧を取得した場合
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '500':
          description: ユーザーの取得に失敗した場合
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /users/{userId}:
    get:
      summary: 指定したIDのユーザーを取得する
      description: 指定したIDのユーザー情報を取得します。
      tags:
        - ユーザー
      parameters:
        - name: userId
          in: path
          required: true
          description: 取得するユーザーのID
          schema:
            type: integer
      responses:
        '200':
          description: 指定したIDのユーザーを取得した場合
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: パスパラメータのバリデーションに失敗した場合
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: 指定したIDのユーザーが存在しない場合
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: ユーザーの取得に失敗した場合
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: 山田 太郎
        createdAt:
          type: string
          format: date-time
          example: '2024-01-01T00:00:00.000Z'
    ApiErrorResponse:
      oneOf:
        - $ref: '#/components/schemas/ValidationErrorResponse'
        - $ref: '#/components/schemas/ErrorResponse'
    ValidationErrorResponse:
      type: object
      properties:
        code:
          type: string
          enum:
            - VALIDATION_ERROR
        message:
          type: string
          example: Validation failed
        details:
          type: array
          items:
            $ref: '#/components/schemas/ZodIssue'
      required:
        - code
        - message
        - details
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          enum:
            - NOT_FOUND
            - UNAUTHORIZED
            - FORBIDDEN
            - CONFLICT
            - INTERNAL_SERVER_ERROR
        message:
          type: string
          example: User not found
      required:
        - code
        - message
    ZodIssue:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        path:
          type: array
          items:
            oneOf:
              - type: string
              - type: integer
      required:
        - code
        - message
        - path
      additionalProperties: true
